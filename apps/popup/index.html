<!DOCTYPE HTML>
<html lang="zh-CN">
    <head>
        <title>FeHelper弹出页面</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="index.css" />
        <script type="text/javascript" src="../static/vendor/evalCore.min.js"></script>
        <script type="text/javascript" src="../static/vendor/vue/vue.js"></script>
    </head>
    <body>
        <div id="pageContainer" class="fh-popup" :class="getLayoutClasses()">
            <header class="fh-header">
                <div class="fh-brand">
                    <img class="fh-brand-mark" src="../static/img/fe-48.png" alt="" aria-hidden="true" />
                    <div class="fh-brand-copy">
                        <strong>FeHelper</strong>
                        <span>v{{ manifest.version || '-' }}</span>
                    </div>
                </div>
                <div class="fh-header-meta">
                    <span>{{ installedToolsCount }} 个工具</span>
                    <button type="button" class="fh-icon-button" @click="openOptionsPage" title="FeHelper配置" aria-label="FeHelper配置">
                        <span aria-hidden="true"></span>
                    </button>
                </div>
            </header>

            <div class="fh-search">
                <span class="fh-search-icon" aria-hidden="true"></span>
                <input
                    ref="searchInput"
                    v-model.trim="searchKey"
                    type="search"
                    class="fh-search-input"
                    placeholder="搜索工具、命令或用途"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="搜索 FeHelper 工具"
                    @input="syncActiveTool"
                />
                <kbd>/</kbd>
            </div>

            <section v-if="shouldShowAiRouter" class="fh-ai-router" aria-label="FeHelper AI 智能识别">
                <div class="fh-ai-router-head">
                    <span class="fh-ai-router-badge" aria-hidden="true">AI</span>
                    <div class="fh-ai-router-copy">
                        <strong>智能识别</strong>
                        <small>{{ aiRouterStatusText }}</small>
                    </div>
                    <div class="fh-ai-router-controls">
                        <button type="button" @click="inspectSearchInput" :disabled="aiRouter.loading || (!searchKey && !aiRouter.input)">识别</button>
                        <button type="button" @click="inspectClipboard" :disabled="aiRouter.loading">剪贴板</button>
                    </div>
                </div>
                <div class="fh-ai-router-body" v-if="aiRouter.analysis && aiRouter.analysis.inputType !== 'empty'">
                    <div class="fh-ai-router-summary">
                        <span>{{ aiRouter.analysis.confidence }}</span>
                        <p>{{ aiRouter.analysis.summary }}</p>
                    </div>
                    <div class="fh-ai-router-signals" v-if="aiRouterSignals.length">
                        <span v-for="signal in aiRouterSignals" :key="signal">{{ signal }}</span>
                    </div>
                    <div class="fh-ai-router-actions">
                        <button
                            v-for="(action, index) in aiRouterActions"
                            :key="action.toolKey + '-' + action.taskKey"
                            type="button"
                            :class="{ 'is-primary': index === 0 }"
                            :title="action.reason || action.desc"
                            @click="runAiRouterAction(action)"
                        >
                            {{ action.commandLabel }}
                        </button>
                        <button type="button" class="fh-ai-router-refine" @click="refineAiRouterWithAi" :disabled="aiRouter.loading || !aiRouter.input">
                            AI 精判
                        </button>
                    </div>
                </div>
            </section>

            <div v-if="isLoading" class="fh-loading" aria-live="polite">
                <div class="fh-skeleton -title"></div>
                <div class="fh-skeleton -row"></div>
                <div class="fh-skeleton -row"></div>
                <div class="fh-skeleton -row"></div>
            </div>

            <div v-else-if="installedToolsCount === 0" class="fh-empty">
                <img class="fh-empty-mark" src="../static/img/fe-48.png" alt="" aria-hidden="true" />
                <strong>还没有安装工具</strong>
                <p>进入工具库安装常用工具后，这里会变成你的快捷入口。</p>
                <button type="button" class="fh-primary-button" @click="openOptionsPage">打开工具库</button>
            </div>

            <main v-else class="fh-command-list" role="listbox" aria-label="FeHelper工具列表">
                <div v-if="flatVisibleTools.length === 0" class="fh-empty -compact">
                    <strong>没有匹配的工具</strong>
                    <p>换一个关键词，或者去工具库查看完整列表。</p>
                </div>
                <template v-else>
                    <section v-for="group in visibleGroups" :key="group.key" class="fh-section">
                        <div class="fh-section-title">
                            <span>{{ group.title }}</span>
                            <span>{{ group.countLabel }}</span>
                        </div>
                        <button
                            v-for="tool in group.tools"
                            :key="group.key + '-' + tool.key"
                            type="button"
                            class="fh-tool-row"
                            :class="{ 'is-active': tool.key === activeToolKey }"
                            role="option"
                            :aria-selected="tool.key === activeToolKey ? 'true' : 'false'"
                            @click="runHelper(tool.key)"
                            @mouseenter="setActiveTool(tool.key)"
                        >
                            <span class="fh-tool-badge" aria-hidden="true">{{ tool.badge }}</span>
                            <span class="fh-tool-copy">
                                <strong>{{ tool.name }}</strong>
                                <small>{{ tool.shortTips }}</small>
                            </span>
                            <span class="fh-tool-meta">
                                <span v-if="tool.favorite" class="fh-favorite-label">收藏</span>
                                <kbd v-if="getShortcut(tool.key)" :title="getShortcutTitle(tool.key)">{{ getShortcut(tool.key) }}</kbd>
                            </span>
                        </button>
                    </section>
                </template>
            </main>

            <footer class="fh-footer">
                <span>↑↓ 选择 · Enter 打开</span>
                <nav aria-label="FeHelper快捷操作">
                    <button type="button" @click="openOptionsPage">工具库</button>
                    <button type="button" @click="openOptionsPage">设置</button>
                    <a href="https://github.com/zxlie/FeHelper/issues" @click="openUrl($event)" target="_blank">反馈</a>
                </nav>
            </footer>
        </div>
        <script src="../static/js/dark-mode.js"></script>
        <script type="module" src="index.js"></script>
    </body>
</html>
