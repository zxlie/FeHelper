<!DOCTYPE HTML>
<html lang="zh-CN">

<head>
    <title>密码生成工具</title>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../static/img/favicon.ico">
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="../static/css/fehelper-tools.css">
    <script type="text/javascript" src="../static/vendor/evalCore.min.js"></script>
    <script type="text/javascript" src="../static/vendor/vue/vue.js"></script>
</head>

<body class="fh-modern">

    <div class="wrapper" id="pageContainer">
        <div class="panel panel-default" style="margin-bottom: 0px;">
            <div class="panel-heading">
                <h3 class="panel-title">
                    <a href="https://fehelper.com" target="_blank" class="x-a-high">
                        <img src="../static/img/fe-16.png" alt="fehelper" /> FeHelper</a>：随机密码生成器
                    <a href="#" class="x-donate-link" @click="openDonateModal($event)"><i class="nav-icon">SP</i>请作者喝咖啡</a>
                    <a class="x-other-tools" @click="openOptionsPage($event)"><i class="icon-plus-circle"></i> 工具市场</a>
                </h3>
            </div>
        </div>
        <div class="panel-body mod-password password-card">

            <div class="row">
                <div class="checkbox">
                    <label><input type="checkbox" v-model="number" @click="convert()">普通数字：【<span>{{chars.number}}</span>】</label>
                </div>
                <div class="checkbox">
                    <label><input type="checkbox" v-model="lowerLetter" @click="convert()">小写字母：【<span>{{chars.lowerLetter}}</span>】</label>
                </div>
                <div class="checkbox">
                    <label><input type="checkbox" v-model="upperLetter" @click="convert()">大写字母：【<span>{{chars.upperLetter}}</span>】</label>
                </div>
                <div class="checkbox">
                    <label><input type="checkbox" v-model="specialChar" @click="convert()">特殊符号：【<span>{{chars.specialChar}}</span>】</label>
                    <div class="special-char-editor">
                        <label for="specialCharSet">特殊符号集合</label>
                        <div class="special-char-row">
                            <input
                                id="specialCharSet"
                                class="form-control special-char-input"
                                type="text"
                                v-model="customSpecialChar"
                                :disabled="!specialChar"
                                @input="updateSpecialChars"
                                @change="convert"
                                autocomplete="off"
                                spellcheck="false"
                            >
                            <button type="button" class="btn special-char-reset" :disabled="customSpecialChar === defaultSpecialChar" @click="resetSpecialChars">恢复默认</button>
                        </div>
                        <p class="special-char-help">勾选特殊符号时，只从这里配置的字符里抽取。</p>
                    </div>
                </div>
                <div class="checkbox">
                    <label>密码长度：<input class="form-control" type="number" min="0" v-model="length" @click="convert()"></label>
                </div>
                <div class="checkbox">
                    <label>生成数量：<input class="form-control" type="number" min="1" v-model="count" @change="convert()"></label>
                </div>

                <div class="checkbox ">
                    <input id="btnCodeChange" class="btn btn-success main-btn" type="button" value="生成随机密码" @click="convert()">
                    <input id="btnCopy" class="btn btn-warning main-btn" type="button" value="复制" @click="copyResult()" v-show="resultContent.length > 0">
                </div>
            </div>

            <div id="rst" class="row result-area" v-show="resultContent.length > 0">
                <textarea class="form-control mod-textarea" id="rstCode" ref="rstCode" readonly v-model="resultContent" @mouseover="getResult()"></textarea>
            </div>
        </div>
        <div v-show="showToast" class="fh-toast">{{ toastMsg }}</div>
    </div>

    <script src="../static/js/tool-layout.js"></script>
    <script type="text/javascript" src="index.js"></script>

    <script src="../static/vendor/jquery/jquery-3.3.1.min.js"></script>
</body>

</html>
